  <circle cx="58" cy="108" r="1.5" fill="#9c3434" stroke="none"/>
  <circle cx="136" cy="104" r="1.5" fill="#9c3434" stroke="none"/>
  <circle cx="144" cy="100" r="1.5" fill="#9c3434" stroke="none"/>
  <circle cx="142" cy="108" r="1.5" fill="#9c3434" stroke="none"/>
