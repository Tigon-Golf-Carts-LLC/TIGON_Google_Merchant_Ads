       CHIN / JAW
       ============================================================ -->

  <path d="M146 298 C166 312 194 320 210 320 C226 320 254 312 274 298" stroke-width="2"/>
  <path d="M156 284 C174 296 196 302 210 302 C224 302 246 296 264 284" stroke-width="1.8"/>

  <!-- ============================================================
       DATABASE CYLINDER (overlapping upper-right of tiger)
       ============================================================ -->

  <!-- Top ellipse -->
  <ellipse cx="380" cy="218" rx="50" ry="18" stroke-width="2.5"/>

  <!-- Cylinder sides -->
  <line x1="330" y1="218" x2="330" y2="298" stroke-width="2.5"/>
  <line x1="430" y1="218" x2="430" y2="298" stroke-width="2.5"/>

