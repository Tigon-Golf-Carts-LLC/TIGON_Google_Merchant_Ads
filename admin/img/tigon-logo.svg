       ============================================================ -->

  <!-- Left cheek stripes -->
  <path d="M80 158 C96 164 112 178 122 192" stroke-width="1.8"/>
  <path d="M72 178 C90 184 108 200 118 216" stroke-width="1.8"/>
  <path d="M68 200 C86 206 104 222 114 238" stroke-width="1.8"/>

  <!-- Right cheek stripes -->
  <path d="M336 158 C320 164 304 178 294 192" stroke-width="1.8"/>
  <path d="M344 178 C326 184 308 200 298 216" stroke-width="1.8"/>
  <path d="M348 200 C330 206 312 222 302 238" stroke-width="1.8"/>

