  <!-- Left branch from hub down -->
  <line x1="310" y1="376" x2="310" y2="406" stroke-width="2"/>
  <line x1="310" y1="406" x2="260" y2="406" stroke-width="2"/>
  <line x1="310" y1="406" x2="360" y2="406" stroke-width="2"/>

  <!-- Left branch nodes (medium) -->
  <rect x="236" y="396" width="30" height="22" rx="3" stroke-width="2"/>
  <rect x="348" y="396" width="30" height="22" rx="3" stroke-width="2"/>

  <!-- Right branch from right hub down -->
  <line x1="450" y1="376" x2="450" y2="406" stroke-width="2"/>
  <rect x="434" y="396" width="30" height="22" rx="3" stroke-width="2"/>

  <!-- Deeper level — lines down from medium nodes -->
  <line x1="251" y1="418" x2="251" y2="444" stroke-width="1.8"/>
  <line x1="251" y1="444" x2="224" y2="444" stroke-width="1.8"/>
  <line x1="251" y1="444" x2="278" y2="444" stroke-width="1.8"/>

  <line x1="363" y1="418" x2="363" y2="444" stroke-width="1.8"/>
  <line x1="363" y1="444" x2="336" y2="444" stroke-width="1.8"/>
  <line x1="363" y1="444" x2="390" y2="444" stroke-width="1.8"/>

  <!-- Leaf nodes (small squares) -->
  <rect x="212" y="438" width="18" height="18" rx="2.5" stroke-width="1.8"/>
  <rect x="270" y="438" width="18" height="18" rx="2.5" stroke-width="1.8"/>

  <rect x="324" y="438" width="18" height="18" rx="2.5" stroke-width="1.8"/>
  <rect x="382" y="438" width="18" height="18" rx="2.5" stroke-width="1.8"/>

  <!-- Bottom-right leaf from right hub branch -->
  <line x1="449" y1="418" x2="449" y2="444" stroke-width="1.8"/>
  <rect x="440" y="438" width="18" height="18" rx="2.5" stroke-width="1.8"/>

</svg>
