  <path d="M190 252 C198 262 222 262 230 252" stroke-width="2"/>

  <!-- Whisker dots - left -->
  <circle cx="144" cy="220" r="3" fill="#ffffff" stroke="none"/>
  <circle cx="132" cy="212" r="3" fill="#ffffff" stroke="none"/>
  <circle cx="128" cy="226" r="3" fill="#ffffff" stroke="none"/>

  <!-- Whisker dots - right -->
  <circle cx="276" cy="220" r="3" fill="#ffffff" stroke="none"/>
  <circle cx="288" cy="212" r="3" fill="#ffffff" stroke="none"/>
  <circle cx="292" cy="226" r="3" fill="#ffffff" stroke="none"/>

