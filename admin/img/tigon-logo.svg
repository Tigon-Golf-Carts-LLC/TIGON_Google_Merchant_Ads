  <path d="M330 244 C330 254 352 262 380 262 C408 262 430 254 430 244" stroke-width="1.8"/>
  <path d="M330 270 C330 280 352 288 380 288 C408 288 430 280 430 270" stroke-width="1.8"/>

  <!-- ============================================================
       NETWORK HIERARCHY — connecting lines and nodes
       ============================================================ -->

  <!-- Main vertical connector from DB bottom -->
  <line x1="380" y1="316" x2="380" y2="340" stroke-width="2"/>

  <!-- Large connector node (hub) -->
  <rect x="290" y="340" width="60" height="36" rx="5" stroke-width="2.2"/>

  <!-- Horizontal bar from hub to right -->
  <line x1="350" y1="358" x2="420" y2="358" stroke-width="2"/>
